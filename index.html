<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MacroEngine" />
<meta name="theme-color" content="#080a0e" />
<title>MacroEngine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0e; --panel:#0d1118; --panel2:#121925; --line:#1a212b; --line2:#222c3a;
    --lime:#c6f135; --blue:#5ec8ff; --orange:#ffb65e; --pink:#ff8fd8; --red:#ff5c5c;
    --txt:#fff; --mut:#8a93a3; --mut2:#5a6372;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    color:var(--txt); min-height:100vh;
    background:radial-gradient(1200px 600px at 80% -10%, #15202b 0%, #080a0e 55%), #080a0e;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
  input[type=number]::-webkit-inner-spin-button{opacity:.25}
  .wrap{max-width:480px;margin:0 auto;padding:26px 16px 90px}
  @media(min-width:1024px){.wrap{max-width:1100px;padding:40px 32px 60px}}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  @media(min-width:1024px){header{margin-bottom:36px}}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:0;line-height:1}
  @media(min-width:1024px){h1{font-size:30px}}
  h1 span{color:var(--lime)}
  .date{font-size:12px;color:var(--mut2);margin-top:6px}
  .tabs{display:flex;gap:4px;padding:4px;background:rgba(13,17,24,.8);border:1px solid var(--line);border-radius:12px}
  .tab{padding:8px 18px;border:0;border-radius:8px;font:600 14px/1 'Sora',sans-serif;background:none;color:var(--mut);cursor:pointer;transition:.18s}
  .tab.on{background:var(--lime);color:#000;box-shadow:0 0 20px -4px var(--lime)}
  .tab:active{transform:scale(.95)}
  .grid{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:1024px){.grid{grid-template-columns:5fr 7fr;gap:24px;align-items:start}}
  .setupgrid{display:grid;grid-template-columns:1fr;gap:24px;align-items:start}
  @media(min-width:1024px){.setupgrid{grid-template-columns:1fr 1fr;gap:32px}}
  .card{background:linear-gradient(135deg,#121925,#0b0e14);border:1px solid #1c2533;border-radius:24px;padding:24px;box-shadow:0 20px 40px -10px rgba(0,0,0,.4)}
  .lbl{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut2)}
  .calhero{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
  .calval{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .caltgt{color:var(--mut2);font-size:20px;font-variant-numeric:tabular-nums;margin-left:6px}
  .chip{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;padding:4px 10px;border-radius:999px;color:var(--lime);background:rgba(198,241,53,.1)}
  .chip.over{color:#fca5a5;background:rgba(255,92,92,.1)}
  .bar{height:12px;border-radius:999px;background:#161c26;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;transition:width .5s ease;background:linear-gradient(90deg,#9fd400,#c6f135)}
  .rings{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:28px}
  .ring{display:flex;flex-direction:column;align-items:center}
  .ring .name{margin-top:10px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
  .ring .sub{font-size:11px;font-variant-numeric:tabular-nums;color:var(--mut2)}
  .ring .sub.over{color:#fca5a5}
  .sect-lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut2);margin:0 0 10px}
  .qa{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .qa button{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;transition:.15s;color:var(--txt)}
  .qa button:hover{border-color:rgba(198,241,53,.7);background:#101620}
  .qa button:active{transform:scale(.95)}
  .qa .n{font-size:13px;font-weight:600;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qa .u{font-size:10px;color:var(--mut2)}
  .qa .m{font-size:11px;color:var(--lime);font-variant-numeric:tabular-nums;margin-top:6px}
  .pop{animation:pop .45s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
  .custombox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:20px}
  .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  @media(min-width:560px){.cgrid{grid-template-columns:repeat(4,1fr)}}
  .cgrid .full{grid-column:1/-1}
  input,select{width:100%;background:#0d1118;border:1px solid var(--line2);border-radius:12px;padding:12px 14px;color:#fff;font:400 14px 'Sora',sans-serif;transition:.15s}
  input:focus,select:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(198,241,53,.25)}
  .btn{width:100%;padding:11px;border:0;border-radius:12px;font:600 14px 'Sora',sans-serif;background:var(--line);color:#fff;cursor:pointer;transition:.15s}
  .btn:hover{background:var(--line2)} .btn:active{transform:scale(.97)}
  .btn-lime{background:var(--lime);color:#000;font-weight:700;padding:14px;border-radius:16px;box-shadow:0 0 30px -8px var(--lime)}
  .btn-lime:hover{filter:brightness(1.1)} .btn-lime:active{transform:scale(.99)}
  .loghead{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
  .clear{background:none;border:0;color:var(--mut2);font:400 11px 'Sora';cursor:pointer}
  .clear:hover{color:var(--red)}
  .loglist{display:flex;flex-direction:column;gap:6px;max-height:42vh;overflow-y:auto;padding-right:4px}
  @media(min-width:1024px){.loglist{max-height:36vh}}
  .item{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .item .nm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .mc{font-size:11px;color:var(--mut2);font-variant-numeric:tabular-nums}
  .item .x{background:none;border:0;color:var(--mut2);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
  .item .x:hover{color:var(--red)}
  .empty{font-size:14px;color:var(--mut2);text-align:center;padding:40px 0;border:1px dashed var(--line);border-radius:16px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field>span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut2)}
  .p2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .opts{display:grid;gap:6px;margin-top:8px}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font:600 14px 'Sora';color:#fff;transition:.15s}
  .opt .note{font-size:11px;color:var(--mut2);font-weight:400}
  .opt.on{border-color:var(--lime);background:rgba(198,241,53,.1)}
  .goals{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
  .goal{padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:#cfd6e0;font:600 14px 'Sora';cursor:pointer;transition:.15s}
  .goal.on{border-color:var(--lime);background:rgba(198,241,53,.1);color:var(--lime)}
  .calc{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center}
  .calc .v{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  @media(min-width:1024px){.calc .v{font-size:30px}}
  .calc .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2);margin-top:2px}
  .calchead{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut2);margin-bottom:20px}
  .note-sm{font-size:11px;color:var(--mut2);text-align:center;line-height:1.5;margin-top:-4px}
  .sticky{position:sticky;top:24px;display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>MACRO<span>ENGINE</span></h1>
      <div class="date" id="date"></div>
    </div>
    <div class="tabs">
      <button class="tab on" data-tab="track">Today</button>
      <button class="tab" data-tab="setup">Targets</button>
    </div>
  </header>
  <div id="content"></div>
</div>

<script>
"use strict";
var ACTIVITY=[
  {id:"sed",label:"Sedentary",mult:1.2,note:"desk, little exercise"},
  {id:"light",label:"Light",mult:1.375,note:"1–3 sessions / wk"},
  {id:"mod",label:"Moderate",mult:1.55,note:"3–5 sessions / wk"},
  {id:"high",label:"High",mult:1.725,note:"6–7 sessions / wk"},
  {id:"athlete",label:"Athlete",mult:1.9,note:"2× / day · padel + gym"}
];
var GOALS=[
  {id:"cut",label:"Cut",adj:-0.18,pPerKg:2.3,fPerKg:0.7},
  {id:"maintain",label:"Maintain",adj:0,pPerKg:2.0,fPerKg:0.9},
  {id:"lean",label:"Lean Bulk",adj:0.1,pPerKg:2.0,fPerKg:1.0}
];
var STAPLES=[
  {name:"Chicken breast",unit:"100g",kcal:165,p:31,c:0,f:3.6},
  {name:"Whole egg",unit:"1 large",kcal:72,p:6.3,c:0.4,f:4.8},
  {name:"Rice pouch",unit:"1 pouch",kcal:340,p:6,c:70,f:4},
  {name:"Kolios Greek",unit:"100g",kcal:59,p:10,c:3.6,f:0.4},
  {name:"Whey isolate",unit:"1 scoop",kcal:110,p:25,c:1,f:0.5},
  {name:"Oats",unit:"50g dry",kcal:190,p:6.5,c:33,f:3.5},
  {name:"Protein milk",unit:"250ml",kcal:95,p:13,c:12,f:0},
  {name:"Lean beef",unit:"100g",kcal:250,p:26,c:0,f:15},
  {name:"Salmon",unit:"100g",kcal:208,p:20,c:0,f:13}
];
var DEFAULTS={weight:84,height:180,age:23,sex:"m",activity:"high",goal:"cut"};

function todayKey(){return new Date().toISOString().slice(0,10);}
function round(n){return Math.round(n);}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function computeTargets(p){
  var w=+p.weight||0,h=+p.height||0,a=+p.age||0;
  var bmr=10*w+6.25*h-5*a+(p.sex==="m"?5:-161);
  var act=ACTIVITY.find(function(x){return x.id===p.activity;})||ACTIVITY[3];
  var goal=GOALS.find(function(x){return x.id===p.goal;})||GOALS[1];
  var tdee=bmr*act.mult;
  var cal=tdee*(1+goal.adj);
  var protein=w*goal.pPerKg, fat=w*goal.fPerKg;
  var carbs=Math.max(0,(cal-protein*4-fat*9)/4);
  return {calories:round(cal),protein:round(protein),carbs:round(carbs),fat:round(fat),bmr:round(bmr),tdee:round(tdee)};
}

// ---- state ----
var profile=load("macro-profile")||Object.assign({},DEFAULTS);
var locked=load("macro-targets");          // null until user locks
var log=load("log:"+todayKey())||[];
var tab="track";

function targets(){return locked||computeTargets(profile);}

function ringSVG(value,target,color,size){
  var pct=target>0?Math.min(value/target,1):0;
  var over=target>0&&value>target;
  var r=size*0.39,C=2*Math.PI*r,sw=size*0.085,off=C*(1-pct);
  var stroke=over?"var(--red)":color;
  var glow=pct>0?("filter:drop-shadow(0 0 6px "+(over?"rgba(255,92,92,.4)":color+"88")+")"):"";
  return '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);display:block">'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#161c26" stroke-width="'+sw+'"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .55s cubic-bezier(.22,1,.36,1),stroke .3s;'+glow+'"/>'+
    '</svg>';
}
function ring(value,target,label,color){
  var size=112,over=target>0&&value>target,diff=round(value-target);
  return '<div class="ring"><div style="position:relative;width:'+size+'px;height:'+size+'px">'+
    ringSVG(value,target,color,size)+
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
      '<span style="font-weight:700;font-variant-numeric:tabular-nums;font-size:'+(size*0.2)+'px;line-height:1">'+round(value)+'</span>'+
      '<span style="color:var(--mut2);font-variant-numeric:tabular-nums;font-size:'+(size*0.095)+'px;margin-top:2px">/ '+target+'g</span>'+
    '</div></div>'+
    '<span class="name">'+label+'</span>'+
    '<span class="sub'+(over?" over":"")+'">'+(over?"+":"")+diff+'g '+(over?"over":"left")+'</span></div>';
}

function totals(){
  return log.reduce(function(a,x){return {calories:a.calories+x.kcal,protein:a.protein+x.p,carbs:a.carbs+x.c,fat:a.fat+x.f};},
    {calories:0,protein:0,carbs:0,fat:0});
}

function summaryHTML(){
  var t=targets(),tot=totals();
  var over=tot.calories>t.calories;
  var pct=t.calories>0?Math.min(100,(tot.calories/t.calories)*100):0;
  var barbg=over?"var(--red)":"linear-gradient(90deg,#9fd400,#c6f135)";
  return '<div class="card">'+
    '<div class="calhero"><div><span class="lbl">Calories</span>'+
      '<div style="display:flex;align-items:baseline;margin-top:4px">'+
        '<span class="calval">'+round(tot.calories)+'</span><span class="caltgt">/ '+t.calories+'</span></div></div>'+
      '<span class="chip'+(over?" over":"")+'">'+(over?"+":"")+round(t.calories-tot.calories)+'</span></div>'+
    '<div class="bar"><i style="width:'+pct+'%;background:'+barbg+'"></i></div>'+
    '<div class="rings">'+ring(tot.protein,t.protein,"Protein","var(--blue)")+
      ring(tot.carbs,t.carbs,"Carbs","var(--orange)")+
      ring(tot.fat,t.fat,"Fat","var(--pink)")+'</div></div>';
}

function logHTML(){
  if(!log.length) return '<div class="empty">Nothing logged yet. Eat like a champion.</div>';
  return log.map(function(x){
    return '<div class="item"><div style="min-width:0"><div class="nm">'+esc(x.name)+'</div>'+
      '<div class="mc">'+round(x.kcal)+' kcal · '+round(x.p)+'P '+round(x.c)+'C '+round(x.f)+'F</div></div>'+
      '<button class="x" data-del="'+x.id+'">×</button></div>';
  }).join("");
}

function trackHTML(){
  var qa=STAPLES.map(function(s,i){
    return '<button data-add="'+i+'"><div class="n">'+esc(s.name)+'</div><div class="u">'+s.unit+'</div>'+
      '<div class="m">'+s.kcal+' · '+s.p+'P</div></button>';
  }).join("");
  return '<div class="grid">'+
    '<section id="summary">'+summaryHTML()+'</section>'+
    '<section>'+
      '<p class="sect-lbl">Quick add</p><div class="qa" id="qa">'+qa+'</div>'+
      '<div class="custombox"><div class="cgrid">'+
        '<input class="full" id="c-name" placeholder="Custom food name"/>'+
        '<input id="c-kcal" type="number" inputmode="numeric" placeholder="kcal"/>'+
        '<input id="c-p" type="number" inputmode="numeric" placeholder="P (g)"/>'+
        '<input id="c-c" type="number" inputmode="numeric" placeholder="C (g)"/>'+
        '<input id="c-f" type="number" inputmode="numeric" placeholder="F (g)"/>'+
      '</div><button class="btn" id="addCustom">+ Add custom</button></div>'+
      '<div class="loghead"><p class="sect-lbl" style="margin:0" id="logcount">Logged · '+log.length+'</p>'+
        (log.length?'<button class="clear" id="clearDay">clear all</button>':'')+'</div>'+
      '<div class="loglist" id="loglist">'+logHTML()+'</div>'+
    '</section></div>';
}

function setupHTML(){
  var t=computeTargets(profile);
  var actOpts=ACTIVITY.map(function(a){
    return '<button class="opt'+(profile.activity===a.id?" on":"")+'" data-act="'+a.id+'">'+
      '<span>'+a.label+'</span><span class="note">'+a.note+'</span></button>';
  }).join("");
  var goalOpts=GOALS.map(function(g){
    return '<button class="goal'+(profile.goal===g.id?" on":"")+'" data-goal="'+g.id+'">'+g.label+'</button>';
  }).join("");
  var g=GOALS.find(function(x){return x.id===profile.goal;});
  return '<div class="setupgrid"><div>'+
    '<div class="p2">'+
      '<label class="field"><span>Weight (kg)</span><input type="number" inputmode="decimal" data-f="weight" value="'+profile.weight+'"/></label>'+
      '<label class="field"><span>Height (cm)</span><input type="number" inputmode="numeric" data-f="height" value="'+profile.height+'"/></label>'+
      '<label class="field"><span>Age</span><input type="number" inputmode="numeric" data-f="age" value="'+profile.age+'"/></label>'+
      '<label class="field"><span>Sex</span><select data-f="sex"><option value="m"'+(profile.sex==="m"?" selected":"")+'>Male</option><option value="f"'+(profile.sex==="f"?" selected":"")+'>Female</option></select></label>'+
    '</div>'+
    '<p class="sect-lbl" style="margin:18px 0 0">Activity</p><div class="opts">'+actOpts+'</div>'+
    '<p class="sect-lbl" style="margin:18px 0 0">Goal</p><div class="goals">'+goalOpts+'</div>'+
    '</div>'+
    '<div class="sticky"><div class="card">'+
      '<div class="calchead"><span>Calculated targets</span><span id="bt" style="font-variant-numeric:tabular-nums">BMR '+t.bmr+' · TDEE '+t.tdee+'</span></div>'+
      '<div class="calc">'+
        '<div><div class="v" id="vc" style="color:var(--lime)">'+t.calories+'</div><div class="k">kcal</div></div>'+
        '<div><div class="v" id="vp" style="color:var(--blue)">'+t.protein+'</div><div class="k">P</div></div>'+
        '<div><div class="v" id="vcarb" style="color:var(--orange)">'+t.carbs+'</div><div class="k">C</div></div>'+
        '<div><div class="v" id="vf" style="color:var(--pink)">'+t.fat+'</div><div class="k">F</div></div>'+
      '</div></div>'+
      '<button class="btn-lime" id="lockBtn">Lock these targets</button>'+
      '<p class="note-sm">Mifflin–St Jeor BMR × activity, goal-adjusted. Protein '+g.pPerKg+'g/kg · fat '+g.fPerKg+'g/kg · carbs fill the rest.</p>'+
    '</div></div>';
}

function render(){
  document.getElementById("content").innerHTML = tab==="track"?trackHTML():setupHTML();
}
function renderSummary(){var el=document.getElementById("summary");if(el)el.innerHTML=summaryHTML();}
function renderLog(){
  var ll=document.getElementById("loglist");if(ll)ll.innerHTML=logHTML();
  var lc=document.getElementById("logcount");if(lc)lc.textContent="Logged · "+log.length;
}
function updatePreview(){
  var t=computeTargets(profile);
  var set=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
  set("vc",t.calories);set("vp",t.protein);set("vcarb",t.carbs);set("vf",t.fat);
  set("bt","BMR "+t.bmr+" · TDEE "+t.tdee);
}

// ---- events (delegated, survive partial re-renders) ----
document.addEventListener("click",function(e){
  var el;
  if((el=e.target.closest("[data-tab]"))){
    tab=el.getAttribute("data-tab");
    document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")===tab);});
    render(); return;
  }
  if((el=e.target.closest("[data-add]"))){
    var s=STAPLES[+el.getAttribute("data-add")];
    log.push({id:Date.now()+""+Math.floor(Math.random()*1e6),name:s.name,kcal:s.kcal,p:s.p,c:s.c,f:s.f});
    save("log:"+todayKey(),log);
    el.classList.remove("pop");void el.offsetWidth;el.classList.add("pop");
    renderSummary();renderLog();return;
  }
  if((el=e.target.closest("[data-del]"))){
    var id=el.getAttribute("data-del");
    log=log.filter(function(x){return x.id!=id;});
    save("log:"+todayKey(),log);renderSummary();renderLog();return;
  }
  if(e.target.closest("#addCustom")){
    var nm=document.getElementById("c-name").value.trim();
    if(!nm)return;
    log.push({id:Date.now()+""+Math.floor(Math.random()*1e6),name:nm,
      kcal:+document.getElementById("c-kcal").value||0,
      p:+document.getElementById("c-p").value||0,
      c:+document.getElementById("c-c").value||0,
      f:+document.getElementById("c-f").value||0});
    save("log:"+todayKey(),log);
    ["c-name","c-kcal","c-p","c-c","c-f"].forEach(function(i){document.getElementById(i).value="";});
    renderSummary();renderLog();return;
  }
  if(e.target.closest("#clearDay")){
    if(confirm("Clear today's log?")){log=[];save("log:"+todayKey(),log);renderSummary();renderLog();}
    return;
  }
  if((el=e.target.closest("[data-act]"))){
    profile.activity=el.getAttribute("data-act");save("macro-profile",profile);
    document.querySelectorAll("[data-act]").forEach(function(b){b.classList.toggle("on",b===el);});
    if(!locked)updatePreview();return;
  }
  if((el=e.target.closest("[data-goal]"))){
    profile.goal=el.getAttribute("data-goal");save("macro-profile",profile);
    document.querySelectorAll("[data-goal]").forEach(function(b){b.classList.toggle("on",b===el);});
    if(!locked)updatePreview();return;
  }
  if(e.target.closest("#lockBtn")){
    locked=computeTargets(profile);save("macro-targets",locked);
    tab="track";
    document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")==="track");});
    render();return;
  }
});

document.addEventListener("input",function(e){
  var el=e.target.closest("[data-f]");
  if(!el)return;
  profile[el.getAttribute("data-f")]=el.value;
  save("macro-profile",profile);
  if(!locked)updatePreview();
});

// ---- init ----
document.getElementById("date").textContent =
  new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
render();
</script>
</body>
</html>
